<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>帮助中心</title>
</head>
<body>
    <h2>帮助中心</h2>
    <h3>功能介绍</h3>
    <ul>
        <li><strong>登录</strong> — 使用用户名和密码登录系统</li>
        <li><strong>注册</strong> — 创建新账号</li>
        <li><strong>搜索用户</strong> — 按用户名或邮箱搜索其他用户</li>
        <li><strong>上传头像</strong> — 上传个人头像图片</li>
        <li><strong>个人中心</strong> — 查看和修改个人资料、充值余额</li>
    </ul>
    <h3>常见问题</h3>
    <ol>
        <li><strong>如何修改密码？</strong> 请联系管理员修改密码。</li>
        <li><strong>充值未到账？</strong> 刷新页面后查看余额。</li>
        <li><strong>账号被锁？</strong> 请联系管理员解锁。</li>
    </ol>
    <p><em>更多问题请联系系统管理员。</em></p>
</body>
</html>
