{% extends "base.html" %}

{% block content %}
{% if username %}
<div class="card">
    <h2>欢迎回来，{{ username }}！</h2>
    <h3>用户信息</h3>
    <ul class="user-info-list">
        <li><span class="label">用户名：</span><span class="value">{{ user.username }}</span></li>
        <li><span class="label">邮箱：</span><span class="value">{{ user.email }}</span></li>
        <li><span class="label">手机：</span><span class="value">{{ user.phone }}</span></li>
        <li><span class="label">角色：</span><span class="value">{{ user.role }}</span></li>
        <li><span class="label">余额：</span><span class="value">{{ user.balance }}</span></li>
    </ul>
    <a href="/logout" class="btn btn-danger">退出登录</a>
</div>
{% else %}
<div class="card">
    <h2>请先登录</h2>
    <p>您尚未登录，请先登录以查看用户信息。</p>
    <a href="/login" class="btn btn-primary">前往登录</a>
</div>
{% endif %}
{% endblock %}
